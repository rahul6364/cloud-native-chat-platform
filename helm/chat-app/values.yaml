namespace: chat-app

networkPolicy:
  enabled: true
  ingressControllerNamespace: ingress-nginx
  monitoringNamespace: monitoring

metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    # Must match kube-prometheus-stack Helm release name
    prometheusRelease: monitoring-stack

frontend:
  replicas: 2
  image:
    repository: rahul6364/full-stack-chatapp-frontend
    tag: 1af83c5
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  env:
    nodeEnv: production
    backendUrl: http://backend:5001
  probes:
    readiness:
      path: /
      port: 80
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3
    liveness:
      path: /
      port: 80
      initialDelaySeconds: 20
      periodSeconds: 15
      failureThreshold: 3
  resources:
    limits:
      memory: 256Mi
      cpu: 200m
    requests:
      memory: 128Mi
      cpu: 100m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

backend:
  replicas: 2
  image:
    repository: rahul6364/full-stack-chatapp-backend
    tag: 1af83c5
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 5001
    targetPort: 5001
  env:
    mongodbUri: mongodb://root:admin@mongodb:27017/chatApp?authSource=admin
    port: "5001"
    nodeEnv: production
  secretRef:
    name: backend-secrets
    keys:
      jwtSecret: jwt-secret
      cloudinaryCloudName: cloudinary-cloud-name
      cloudinaryApiKey: cloudinary-api-key
      cloudinaryApiSecret: cloudinary-api-secret
  probes:
    readiness:
      path: /health
      port: 5001
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 3
    liveness:
      path: /health
      port: 5001
      initialDelaySeconds: 60
      periodSeconds: 20
      failureThreshold: 5
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 250m
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

mongodb:
  replicas: 1
  image:
    repository: iemafzal/mongodb
    tag: v1
  service:
    port: 27017
    targetPort: 27017
    annotations:
      argocd.argoproj.io/sync-options: Replace=true
  auth:
    rootUsername: root
    rootPassword: admin
  persistence:
    size: 1Gi
    accessModes:
      - ReadWriteOnce
  probes:
    startup:
      port: 27017
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 40
    readiness:
      port: 27017
      initialDelaySeconds: 20
      periodSeconds: 10
    liveness:
      port: 27017
      initialDelaySeconds: 60
      periodSeconds: 15
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 250m
  pdb:
    enabled: true
    maxUnavailable: 0

configmap:
  nginxConf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://backend.chat-app.svc.cluster.local:5001/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /socket.io/ {
            proxy_pass http://backend.chat-app.svc.cluster.local:5001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Socket.io sessions are in-memory per pod — pin clients to one backend replica
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-name: chat-app-backend
    nginx.ingress.kubernetes.io/session-cookie-max-age: "86400"
    nginx.ingress.kubernetes.io/session-cookie-expires: "86400"
    nginx.ingress.kubernetes.io/session-cookie-change-on-failure: "true"
    nginx.ingress.kubernetes.io/websocket-services: backend
  host: chat-app.com
  paths:
    api: /api
    socket: /socket.io
    root: /

sealedSecret:
  enabled: true
  name: backend-secrets
  encryptedData:
    cloudinaryApiKey: 
    cloudinaryApiSecret: 
    cloudinaryCloudName: 
    jwtSecret: 
