{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend
  namespace: {{ include "chat-app.namespace" . }}
spec:
  podSelector:
    matchLabels:
      {{- include "chat-app.labels.frontend" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.frontend.service.targetPort }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend
  namespace: {{ include "chat-app.namespace" . }}
spec:
  podSelector:
    matchLabels:
      {{- include "chat-app.labels.backend" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "chat-app.labels.frontend" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.targetPort }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.targetPort }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.targetPort }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb
  namespace: {{ include "chat-app.namespace" . }}
spec:
  podSelector:
    matchLabels:
      {{- include "chat-app.labels.mongodb" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "chat-app.labels.backend" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.mongodb.service.targetPort }}
{{- end }}
