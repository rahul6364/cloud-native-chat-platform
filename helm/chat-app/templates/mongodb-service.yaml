apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: {{ include "chat-app.namespace" . }}
  annotations:
{{- toYaml .Values.mongodb.service.annotations | nindent 4 }}
spec:
  selector:
    app: mongodb
  ports:
    - port: {{ .Values.mongodb.service.port }}
      targetPort: {{ .Values.mongodb.service.targetPort }}
